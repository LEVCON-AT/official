# ═══════════════════════════════════════════════════════════════
#  ENGINE.LEVCON.AI — NGINX CONFIG (n8n Reverse Proxy + SSL)
#  Pfad auf VPS: /etc/nginx/sites-available/engine.levcon.at
# ═══════════════════════════════════════════════════════════════
#
#  State-of-the-Art:
#  - HTTP/2
#  - Modern SSL
#  - HSTS
#  - WebSocket-Support (n8n braucht WebSockets für Live-Updates)
#  - Basic Auth als zusätzliche Sicherheitsschicht
#  - Security Headers
#  - Reverse Proxy zu n8n Docker Container (Port 5678)

# Upstream n8n (Docker Container)
upstream n8n_engine {
    server 127.0.0.1:5678;
    keepalive 32;
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name engine.levcon.at;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Main Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name engine.levcon.at;

    # ── SSL ────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/engine.levcon.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engine.levcon.at/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/engine.levcon.at/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/engine.levcon.at.access.log;
    error_log /var/log/nginx/engine.levcon.at.error.log warn;

    # ── ACME Challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # ── n8n Webhook Endpoints (öffentlich, kein Basic Auth) ────
    # Wichtig: n8n Webhooks brauchen öffentlichen Zugriff
    location ~ ^/webhook/ {
        proxy_pass http://n8n_engine;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (für n8n Webhooks)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ── n8n UI (mit Basic Auth Schutz) ─────────────────────────
    location / {
        # Basic Auth (zusätzlich zu n8n Login)
        auth_basic "Levcon n8n Engine";
        auth_basic_user_file /etc/nginx/.htpasswd.engine;

        proxy_pass http://n8n_engine;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (n8n UI Live-Updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }

    client_max_body_size 50m;
}
