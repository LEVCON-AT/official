# ═══════════════════════════════════════════════════════════════
#  LEVCON.AI — NGINX CONFIG (Next.js + SSL)
#  Pfad auf VPS: /etc/nginx/sites-available/levcon.ai
# ═══════════════════════════════════════════════════════════════
#
#  State-of-the-Art:
#  - HTTP/2
#  - Modern SSL (TLS 1.2/1.3, keine alten Ciphern)
#  - HSTS (1 Jahr + preload)
#  - Security Headers (X-Frame, X-Content-Type, Referrer-Policy, CSP)
#  - gzip
#  - Reverse Proxy zu Next.js (Port 3000)
#  - Rate Limiting für API

# Rate Limiting Zone (gegen Brute-Force)
limit_req_zone $binary_remote_addr zone=levcon_api:10m rate=10r/s;

# Upstream Next.js
upstream levcon_nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name levcon.ai;

    # ACME Challenge (für certbot --webroot Renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Alles andere → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Main Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name levcon.ai;

    # ── SSL ────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/levcon.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/levcon.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/levcon.ai/chain.pem;

    # Modern SSL Config (Mozilla Intermediate, 2024)
    # WICHTIG: Eindeutige Zone-Namen, damit keine Konflikte mit anderen Sites auf dem VPS
    ssl_session_timeout 1d;
    ssl_session_cache shared:LEVCON_SSL:50m;
    ssl_session_tickets off;

    # ssl_protocols und ssl_ciphers werden global in nginx.conf gesetzt
    # (vermeidet "protocol options redefined" Warnungen)

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/levcon.ai.access.log;
    error_log /var/log/nginx/levcon.ai.error.log warn;

    # ── ACME Challenge (auch über HTTPS) ───────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # ── Static Assets (Next.js _next/static) ───────────────────
    location /_next/static/ {
        proxy_pass http://levcon_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Next.js Image Optimization ─────────────────────────────
    location /_next/image {
        proxy_pass http://levcon_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── Favicon & static files ─────────────────────────────────
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot|txt|xml|webmanifest)$ {
        proxy_pass http://levcon_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ── API Rate Limiting ──────────────────────────────────────
    location /api/ {
        limit_req zone=levcon_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://levcon_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Main Reverse Proxy (Next.js) ───────────────────────────
    location / {
        proxy_pass http://levcon_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ── Gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2
        application/font-woff2;

    client_max_body_size 10m;
}
