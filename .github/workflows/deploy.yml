# ═══════════════════════════════════════════════════════════════
#  LEVCON.AI — GITHUB ACTIONS DEPLOYMENT WORKFLOW
#  Datei: .github/workflows/deploy.yml
# ═══════════════════════════════════════════════════════════════
#
#  Trigger: Jeder Push auf `main` → automatisches Deployment auf VPS
#  Manueller Trigger: GitHub UI → Actions → "Deploy to VPS" → Run workflow
#
#  Voraussetzungen (siehe deploy/DEPLOYMENT.md):
#  1. Einmaliges Initial-Setup via deploy/scripts/deploy.sh auf VPS
#  2. GitHub Secrets konfiguriert:
#     - VPS_HOST (z.B. 87.106.25.91)
#     - VPS_USER (z.B. root oder deploy-User)
#     - VPS_SSH_KEY (private SSH-Key)
#     - VPS_PORT (optional, default 22)

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Verhindert parallele Deploys
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e
          PORT="${VPS_PORT:-22}"
          echo "Using VPS_HOST=$VPS_HOST PORT=$PORT"
          
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write private key
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Verify key was written
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "ERROR: VPS_SSH_KEY secret is empty or not set"
            exit 1
          fi
          
          # Key scan (more robust with timeout)
          echo "Scanning VPS host key on port $PORT..."
          ssh-keyscan -p "$PORT" -T 30 "$VPS_HOST" >> ~/.ssh/known_hosts 2>&1 || {
            echo "ERROR: ssh-keyscan failed for $VPS_HOST:$PORT"
            exit 1
          }
          
          # Test SSH connection
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o ConnectTimeout=10 -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@$VPS_HOST" "echo SSH_OK" || {
            echo "ERROR: SSH connection failed"
            exit 1
          }
          echo "✓ SSH setup complete"

      - name: Copy update script to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          PORT="${VPS_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$PORT" -o StrictHostKeyChecking=yes \
            deploy/scripts/vps-update.sh \
            "$VPS_USER@$VPS_HOST:/tmp/vps-update.sh"

      - name: Execute update script on VPS
        uses: appleboy/ssh-action@v1
        env:
          PORT: ${{ secrets.VPS_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: PORT
          script: |
            chmod +x /tmp/vps-update.sh
            bash /tmp/vps-update.sh

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            sleep 5
            echo "=== Service Status ==="
            systemctl is-active levcon
            echo "=== DB File ==="
            ls -la /var/www/levcon/db/ 2>&1
            echo "=== .env DATABASE_URL ==="
            grep DATABASE_URL /var/www/levcon/.env
            echo "=== Test local ==="
            curl -sI http://127.0.0.1:3002/ | head -3
            echo "=== Test external ==="
            curl -sI https://levcon.ai/ | head -3
            if curl -sf https://levcon.ai/ -o /dev/null; then
              echo "✅ Health check passed — site is up"
            else
              echo "❌ Health check failed"
              journalctl -u levcon --no-pager -n 10
              exit 1
            fi

      - name: Cleanup
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            rm -f /tmp/vps-update.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
